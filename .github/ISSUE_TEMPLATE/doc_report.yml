name: 文档问题
description: 报告文档说明错误、链接失效或示例过时
title: "Docs: "
labels:
  - documentation
body:
  - type: markdown
    value: |
      提交前请先 [搜索已有 Issue](https://github.com/ansgoo/music-free-site/issues)，并阅读 [反馈说明](https://github.com/ansgoo/music-free-site/blob/main/docs/feedback.md)。

      程序 Bug 请使用 **Bug 报告** 模板。

  - type: checkboxes
    id: searched
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复
          required: true

  - type: input
    id: doc_page
    attributes:
      label: 相关文档页面
      description: 文档路径或完整 URL。
      placeholder: "例如 docs/music.md 或 https://ansgoo.github.io/music-free-site/music"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 说明哪里不正确、链接是否失效、示例是否过时等。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的正确内容
      description: 你认为文档应如何修改。
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息（可选）
      description: 截图、建议的修改措辞、相关 PR 链接等。
