name: 文档问题
description: 报告文档说明错误、链接失效或示例过时
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请先 [搜索已有 Issue](https://github.com/ansgoo/music-free-site/issues)，并阅读 [反馈说明](https://github.com/ansgoo/music-free-site/blob/main/docs/feedback.md)。

        程序 Bug 请使用 **Bug 报告** 模板。
  - type: checkboxes
    attributes:
      label: 是否已有相关 Issue？
      description: 请先搜索，避免重复提交。
      options:
        - label: 我已搜索过现有 Issue
          required: true
  - type: input
    id: doc-page
    attributes:
      label: 相关文档页面
      description: 文档路径或完整 URL
      placeholder: "docs/music.md"
    validations:
      required: true
  - type: textarea
    attributes:
      label: 问题描述
      description: 哪里不正确、链接是否失效、示例是否过时。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 期望的正确内容
      description: 你认为文档应如何修改。
    validations:
      required: true
  - type: textarea
    attributes:
      label: 补充信息
      description: |
        可附上截图、建议措辞或相关 PR 链接。

        提示：可将文件拖拽到评论区。
    validations:
      required: false
