name: Bug 报告
description: 报告 MusicFree 程序异常或错误行为
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    value: |
      提交前请先 [搜索已有 Issue](https://github.com/ansgoo/music-free-site/issues)，并阅读 [反馈说明](https://github.com/ansgoo/music-free-site/blob/main/docs/feedback.md)。

      文档错误请使用 **文档问题** 模板，不要选本模板。

  - type: checkboxes
    id: searched
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复
          required: true

  - type: input
    id: version
    attributes:
      label: MusicFree 版本
      description: 镜像标签、发布版本或 commit。
      placeholder: "例如 v1.2.3、latest 或 commit abc1234"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: 部署方式、操作系统、相关插件等。
      placeholder: |
        例如：
        - 部署：Docker / 裸机
        - 系统：Ubuntu 22.04
        - 插件：mf-plugin-netease（已启用）
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 从操作到出现问题的完整路径。
      placeholder: |
        1. 打开 /admin/music
        2. 点击「开始检测」
        3. 出现报错……
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 当前观察到的现象或错误信息。
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 你认为正确的行为应该是什么。
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息（可选）
      description: 截图、日志片段、相关链接等。
