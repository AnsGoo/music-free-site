name: 功能特性
description: 提出新功能或改进建议
title: "愿望："
labels:
  - enhancement
body:
  - type: markdown
    value: |
      感谢你愿意为 MusicFree 贡献想法。请尽量说明你想解决的问题，以及期望的功能行为。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 希望增加什么功能？它应如何工作？
      placeholder: |
        希望增加 XXX 功能。

        例如：
        - 使用场景：……
        - 期望行为：……
        - 可选：参考截图、链接或类似产品
    validations:
      required: true
